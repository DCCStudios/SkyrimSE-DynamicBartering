[General]
bEnabled=true
iUIMode=1
bShowAcceptanceHint=true
bShowRelationshipPreview=true
; Controller glyph set for keybind hints: 0=Xbox, 1=PlayStation
iGamepadIconStyle=0
iPopupDelayMs=200
bSkipBelowThreshold=false
iValueThreshold=50
; Show the barter cart panel as soon as the menu opens (with an empty-state hint),
; not just after the first item is added.
bCartVisibleByDefault=true
; Two-step first-run tutorial. Armed on first install; auto-disables once both
; popups have been seen. Re-enable in the SKSE menu to replay it.
bTutorialEnabled=true
bTutorialCartSeen=false
bTutorialOfferSeen=false

[Pricing]
fSliderRangeMin=-0.30
fSliderRangeMax=0.30
fBaseAcceptanceChance=50.0
fSpeechWeight=20.0
fHagglingPerkBonus=5.0
fPersuasionPerkBonus=15.0
fAllureBonus=10.0
fRelationshipWeight=15.0
fPersonalityWeight=20.0
fDealHistoryWeight=2.0
fGreedFactor=1.5
bUseVanillaBasePrice=true
fStolenItemPenalty=30.0
fFencePerkReduction=66.0
; Relationship-driven haggling range: how strongly your standing widens (when liked)
; or contracts (when disliked) how far you can push the offer slider. At +/-100
; relationship this adds/subtracts up to (fRelHaggleRangeWeight * personality scale)
; to the favorable side (deeper buy discounts / higher sell overcharges).
fRelHaggleRangeWeight=0.35
; Scales the NEUTRAL-standing baseline haggle room (the spread at 0 relationship,
; before any standing/perk bonus). Lower = tighter deals out of the gate. The baseline
; is also shaped by personality (Greedy/Stern give less, Generous/Sleazy more) even at
; neutral. 1.0 = the old wide neutral spread; ~0.45 keeps starting deals close to market.
fNeutralHaggleScale=0.45
; Hard caps on the favorable side of the slider (fraction of market price).
fMaxBuyDiscount=0.60
fMaxSellMarkup=0.60
; Merchant specialties: merchants haggle more readily on goods they actually deal in.
; fSpecialtyWeight = acceptance-chance points a full in-specialty match adds (and an
; off-specialty mismatch subtracts).
bSpecialtyHaggling=true
fSpecialtyWeight=12.0
; Reflect the relationship/personality price effect in the vanilla BarterMenu item-card
; price (chains with other price mods). Off = effect only shows in the mod's own UI and
; the negotiated gold.
bShowRelationshipInVanillaPrices=true

[Relationships]
fRelGainFairDeal=3.0
fRelLossInsult=5.0
fRelDecayRate=0.1
iRelMax=100
iRelMin=-100
iPriceJackThreshold=-20
fPriceJackIntensity=1.0
; Good standing also earns a base-price break (and bad standing a markup). This is the
; relationship at/above which buy discounts / sell bonuses begin, mirroring the jack
; threshold on the favorable side.
iPriceBreakThreshold=20
; Widespread reputation gains across a whole merchant category when the player hits
; major milestones (Archmage -> magic traders, Guildmaster -> fences, etc.).
bMilestoneReputation=true

[Personalities]
fCounterOfferBaseChance=30.0
iCounterOfferPatience=3

[Sound]
bEnableSounds=true
fSoundVolume=1.0
; Add/remove from the cart plays each item's own vanilla pickup/putdown sound (the cue
; Skyrim would play on a quick buy/sell) instead of the mod's generic AddToCart/
; RemoveFromCart WAVs. Falls back to the WAV cue when an item has no resolvable sound.
bUseVanillaCartSounds=true

[CHIM]
; Push barter events to a running CHIM / HerikaServer so AI NPCs can react to
; haggling, intimidation and deals. Off by default; requires the companion
; server plugin (CHIM-DynamicBartering). Harmless if CHIM is not installed.
bEnableChim=false
; Base URL of the CHIM server. comm.php is derived as <url>/HerikaServer/comm.php
sServerUrl=http://localhost:8081
iTimeoutMs=3000
; Queue an immediate spoken bark for "big moments" (intimidation, big lowball, etc.)
bImmediateReactions=true
; Per-merchant cooldowns (seconds) for spoken reactions. Reaction = intimidation /
; overpay / insult barks; Counter = merchant justifying a counter-offer. They run on
; separate timers so they don't mute each other. 0 = no cooldown. Sent to the server,
; which uses these in place of its own globals.php defaults.
iReactionCooldownSec=20
iCounterCooldownSec=6
; When SkyrimSouls - Unpaused Game Menus is installed it keeps the world running during
; the barter menu so NPCs can speak live while haggling. This ensures the custom barter
; offer window never re-introduces a pause on top of that. Ignored if SkyrimSouls is absent.
bUnpauseOfferWindow=true
; Skyrim won't voice NPC lines while a menu is the topmost view (even when unpaused),
; so barter events are buffered during the menu and sent once it closes. This optional
; delay (seconds) waits after the menu closes before sending, so the game has unpaused and
; the player is back in the world and the reaction is actually audible. 0 = send immediately.
iSendDelaySec=3
; Also push each outcome to CHIM live, mid-haggle, as memory only (no spoken line - Skyrim
; mutes both voice and subtitles while a menu is open). This only feeds the merchant's running
; memory so it knows the blow-by-blow if you talk to it later; the audible reaction still comes
; from the after-close summary. Off by default.
bLiveContextLogging=false

[Debug]
bDebugLogging=false
bShowRollInConsole=false
